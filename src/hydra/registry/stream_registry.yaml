      - "Bureau of Labor Statistics|https://api.bls.gov/|JSON|api_key|Employment and labor data"
      - "Bureau of Economic Analysis|https://apps.bea.gov/api/|JSON|api_key|GDP and economic accounts"
      - "Federal Reserve FRED|https://api.stlouisfed.org/fred/|JSON|api_key|Economic time series"
      - "SEC EDGAR|https://efts.sec.gov/LATEST/|JSON|none|Corporate filings"
      - "US Treasury|https://api.fiscaldata.treasury.gov/|JSON|none|Fiscal data"
