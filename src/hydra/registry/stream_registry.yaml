  - id: 19
    name: "Sanctions & Financial Intel"
    streams: 8
    access: "8G"
    formats: "JSON, CSV, XML"
    cadence: daily
    adapter: rest_json
    fallback: null
    storage:
      storage_engines: [postgres, elasticsearch, neo4j]
      es_index_prefix: hydra-sanctions
      es_text_fields: [name, aliases, remarks, program]
      es_keyword_fields: [entity_id, entity_type, country, list_type]
      graph_schema:
        node_label_field: "entity_type"
        node_id_field: "entity_id"
        node_properties:
          - name
          - aliases
          - country
          - program
          - list_date
          - remarks
        edge_rules:
          - type: "ownership"
            source_field: "owner_id"
            target_field: "owned_id"
            edge_label_static: "OWNS"
            edge_properties:
              - ownership_percentage
              - effective_date
          - type: "association"
            source_field: "entity_id"
            target_field: "associated_entity_id"
            edge_label_static: "ASSOCIATED_WITH"
            edge_properties:
              - association_type
    sources:
      - "OFAC SDN|https://sanctionslistservice.ofac.treas.gov/|JSON,XML|none|Specially Designated Nationals"
      - "EU Sanctions|https://webgate.ec.europa.eu/fsd/fsf/|JSON,XML|none|EU consolidated sanctions"
