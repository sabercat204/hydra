      - "France data.gouv.fr|https://www.data.gouv.fr/api/|JSON,CSV|none|French open data"
      - "Germany GovData|https://www.govdata.de/|JSON,CSV|none|German open data"
      - "Netherlands CBS|https://opendata.cbs.nl/|JSON|none|Dutch statistics"
      - "Italy ISTAT|https://esploradati.istat.it/|SDMX,JSON|none|Italian statistics"
      - "Spain INE|https://servicios.ine.es/|JSON|none|Spanish statistics"
      - "Denmark DST|https://api.statbank.dk/|JSON|none|Danish statistics"
      - "Eurostat NUTS|https://ec.europa.eu/eurostat/web/nuts/|JSON|none|Regional classification"

  - id: 10
    name: "Asia-Pacific Gov"
    streams: 13
    access: "10G/3B"
    formats: "JSON, CSV, XML"
    cadence: weekly
    adapter: ckan
    fallback: rest_json
    sources:
      - "Japan e-Stat|https://api.e-stat.go.jp/|JSON,XML|api_key|Japanese government statistics"
      - "South Korea KOSIS|https://kosis.kr/|JSON|api_key|Korean Statistical Information Service"
      - "India data.gov.in|https://data.gov.in/|JSON,CSV|api_key|Indian open data"
      - "Singapore data.gov.sg|https://data.gov.sg/api/|JSON|none|Singapore open data"
      - "Taiwan data.gov.tw|https://data.gov.tw/api/|JSON,CSV|none|Taiwan open data"
      - "ASEAN Stats|https://data.aseanstats.org/|JSON,CSV|none|ASEAN statistical portal"
      - "Pacific Community SPC|https://stats.pacificdata.org/|JSON,SDMX|none|Pacific island statistics"
      - "Australia data.gov.au|https://data.gov.au/api/|JSON,CSV|none|Australian open data"
      - "New Zealand data.govt.nz|https://catalogue.data.govt.nz/api/|JSON,CSV|none|NZ open data"
      - "China National Bureau of Statistics|https://data.stats.gov.cn/|JSON|none|Chinese statistics"
      - "Thailand NSO|https://www.nso.go.th/|JSON,CSV|none|Thai statistics"
      - "Philippines PSA|https://openstat.psa.gov.ph/|JSON,CSV|none|Philippine statistics"
      - "Indonesia BPS|https://webapi.bps.go.id/|JSON|api_key|Indonesian statistics"

  - id: 11
    name: "Americas Gov Non-US"
    streams: 8
    access: "8G"
    formats: "JSON, CSV"
    cadence: weekly
    adapter: ckan
    fallback: rest_json
    sources:
      - "Canada open.canada.ca|https://open.canada.ca/data/api/|JSON,CSV|none|Canadian open data"
      - "Mexico datos.gob.mx|https://datos.gob.mx/|JSON,CSV|none|Mexican open data"
      - "Brazil dados.gov.br|https://dados.gov.br/api/|JSON,CSV|none|Brazilian open data"
      - "Colombia datos.gov.co|https://www.datos.gov.co/api/|JSON,CSV|none|Colombian open data"
      - "Argentina datos.gob.ar|https://datos.gob.ar/api/|JSON,CSV|none|Argentine open data"
      - "Chile datos.gob.cl|https://datos.gob.cl/api/|JSON,CSV|none|Chilean open data"
      - "Peru datosabiertos.gob.pe|https://www.datosabiertos.gob.pe/api/|JSON,CSV|none|Peruvian open data"
      - "Uruguay catalogodatos.gub.uy|https://catalogodatos.gub.uy/api/|JSON,CSV|none|Uruguayan open data"

  - id: 12
    name: "ME/Africa/Central Asia Gov"
    streams: 10
    access: "8G/2B"
    formats: "JSON, CSV, XML"
    cadence: weekly
    adapter: rest_json
    fallback: null
    sources:
      - "UAE FCSC|https://opendata.fcsc.gov.ae/|JSON,CSV|none|UAE open data"
      - "Saudi Arabia GASTAT|https://www.stats.gov.sa/|JSON|none|Saudi statistics"
      - "Israel CBS|https://www.cbs.gov.il/|JSON,CSV|none|Israeli statistics"
      - "South Africa StatsSA|https://www.statssa.gov.za/|JSON,CSV|none|South African statistics"
      - "Kenya KNBS|https://www.knbs.or.ke/|JSON,CSV|none|Kenyan statistics"
      - "Ghana GSS|https://statsghana.gov.gh/|JSON,CSV|none|Ghanaian statistics"
      - "Morocco HCP|https://www.hcp.ma/|JSON|none|Moroccan statistics"
      - "Nigeria NBS|https://nigerianstat.gov.ng/|JSON,CSV|none|Nigerian statistics"
      - "Kazakhstan stat.gov.kz|https://stat.gov.kz/|JSON|none|Kazakh statistics"
      - "Turkey TUIK|https://data.tuik.gov.tr/|JSON|none|Turkish statistics"

  - id: 13
    name: "US State & Local"
    streams: 6
    access: "6G"
    formats: "JSON, CSV, GeoJSON"
    cadence: 15min
    adapter: ckan
    fallback: null
    sources:
      - "TheDataProject.AI|https://thedataproject.ai/api/|JSON|api_key|Aggregated state/local data"
      - "Socrata/Tyler|https://data.cityofchicago.org/api/|JSON,CSV|none|Socrata open data platform"
      - "Chicago CTA|https://www.transitchicago.com/api/|JSON,XML|api_key|Chicago Transit Authority"
      - "NYC Open Data|https://data.cityofnewyork.us/api/|JSON,CSV|none|New York City open data"
      - "California Open Data|https://data.ca.gov/api/|JSON,CSV|none|California state data"
      - "State/Local Portals|https://us-city-open-data.github.io/|JSON,CSV|none|Aggregated portal index"

  - id: 14
    name: "Arms & Defense Trade"
    streams: 6
    access: "4G/2B"
    formats: "JSON, CSV, XML"
    cadence: annual
    adapter: rest_json
    fallback: scrape_rss
    sources:
      - "UN Register of Conventional Arms|https://www.unroca.org/|JSON,CSV|none|UN arms register"
      - "SIPRI Arms Transfers|https://www.sipri.org/databases/armstransfers|CSV|none|Arms transfer database"
      - "SIPRI Military Expenditure|https://www.sipri.org/databases/milex|CSV|none|Military spending database"
      - "SIPRI Arms Embargoes|https://www.sipri.org/databases/embargoes|JSON|none|Arms embargo database"
      - "Janes|https://www.janes.com/|JSON|api_key|Defense intelligence (commercial)"
      - "SIPRI Mapping ATT|https://www.sipri.org/databases/national-reports|CSV|none|Arms Trade Treaty reports"

  - id: 15
    name: "Conflict & Event Data"
    streams: 4
    access: "3G/1B"
    formats: "JSON, CSV"
    cadence: weekly
    adapter: rest_json
    fallback: null
    storage:
      storage_engines: [postgres, elasticsearch, neo4j]
      es_index_prefix: hydra-conflict
      es_text_fields: [description, notes, source_article]
      graph_schema:
        node_label_field: "event_type"
        node_id_field: "event_id"
        node_properties:
          - event_date
          - country
          - admin1
          - admin2
          - location
          - fatalities
          - source
          - notes
        edge_rules:
          - type: "actor_event"
            source_field: "actor_id"
            target_field: "event_id"
            edge_label_static: "PARTICIPATED_IN"
            edge_properties:
              - role
              - side
    sources:
      - "ACLED|https://acleddata.com/|JSON,CSV|api_key|Armed Conflict Location & Event Data"
      - "GDELT|https://api.gdeltproject.org/|JSON,CSV|none|Global Database of Events Language and Tone"
      - "UCDP|https://ucdpapi.pcr.uu.se/api/|JSON|none|Uppsala Conflict Data Program"
      - "ICG CrisisWatch|https://www.crisisgroup.org/crisiswatch|JSON|none|International Crisis Group"

  - id: 16
    name: "Cyber Threat Intel"
    streams: 8
    access: "5G/3B"
    formats: "STIX, JSON, CSV"
    cadence: hourly
    adapter: stix_taxii
    fallback: rest_json
    storage:
      storage_engines: [postgres, elasticsearch, neo4j]
      es_index_prefix: hydra-cyber
      es_text_fields: [description, name, pattern]
      es_keyword_fields: [mitre_attack_id, cve_id, stix_type]
      graph_schema:
        node_label_field: "type"
        node_id_field: "id"
        node_properties:
          - name
          - description
          - created
          - modified
          - mitre_attack_id
          - cve_id
          - pattern
          - kill_chain_phases
        edge_rules:
          - type: "relationship"
            source_field: "source_ref"
            target_field: "target_ref"
            edge_label_field: "relationship_type"
            edge_properties:
              - description
          - type: "sighting"
            source_field: "sighting_of_ref"
            target_field: null
            edge_label_field: null
    sources:
      - "MITRE ATT&CK|https://attack.mitre.org/|STIX|none|Adversarial tactics and techniques"
      - "NIST NVD|https://services.nvd.nist.gov/rest/json/|JSON|api_key|National Vulnerability Database"
      - "CISA KEV|https://www.cisa.gov/known-exploited-vulnerabilities-catalog|JSON|none|Known Exploited Vulnerabilities"
      - "AlienVault OTX|https://otx.alienvault.com/|STIX,JSON|api_key|Open Threat Exchange"
      - "Shodan|https://api.shodan.io/|JSON|api_key|Internet-connected device search"
      - "VirusTotal|https://www.virustotal.com/api/v3/|JSON|api_key|Malware analysis"
      - "Abuse.ch|https://urlhaus-api.abuse.ch/|JSON,CSV|none|Threat feeds"
      - "DISA STIGs|https://public.cyber.mil/stigs/|STIX,XML|none|Security Technical Implementation Guides"

  - id: 17
    name: "Social Media & Web OSINT"
    streams: 6
    access: "4G/2B"
    formats: "JSON"
    cadence: 15min
    adapter: rest_json
    fallback: s3_bulk
    sources:
      - "Reddit|https://www.reddit.com/|JSON|api_key|Reddit API"
      - "Telegram Bot API|https://api.telegram.org/|JSON|api_key|Telegram bot interface"
      - "X/Twitter|https://api.twitter.com/2/|JSON|api_key|X platform API"
      - "Meta/Instagram|https://graph.facebook.com/|JSON|api_key|Meta Graph API"
      - "Wayback Machine|https://web.archive.org/|JSON|none|Internet Archive"
      - "Common Crawl|https://commoncrawl.org/|WARC|none|Web crawl archive"

  - id: 18
    name: "Aviation & Maritime"
    streams: 7
    access: "4G/3B"
    formats: "JSON, NMEA, SBS"
    cadence: sub_minute
    adapter: ais_adsb
    fallback: null
    storage:
      storage_engines: [postgres, influxdb]
      influx_fields: [latitude, longitude, altitude, speed, heading, vertical_rate]
      influx_tag_fields: [stream_id, tier, icao24, callsign, mmsi, vessel_type]
    sources:
      - "ADS-B Exchange|https://adsbexchange.com/|JSON|rapidapi_key|ADS-B aircraft tracking"
      - "OpenSky Network|https://opensky-network.org/|JSON|none|Open aircraft tracking"
      - "AIS (generic)|https://www.marinetraffic.com/|JSON,NMEA|api_key|Automatic Identification System"
