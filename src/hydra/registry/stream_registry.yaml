      - "NASA SDO|https://sdo.gsfc.nasa.gov/|FITS,JSON|none|Solar Dynamics Observatory"

  - id: 4
    name: "Satellite Imagery & EO"
    streams: 5
    access: "3G/2B"
    formats: "GeoTIFF, NetCDF, JSON, STAC"
    cadence: daily
    adapter: rest_json
    fallback: s3_bulk
    storage:
      storage_engines: [postgres, minio]
      minio_bucket: hydra-tier-4
    sources:
      - "Copernicus|https://scihub.copernicus.eu/|GeoTIFF,NetCDF|api_key|EU Earth observation program"
      - "NASA Earthdata|https://cmr.earthdata.nasa.gov/|JSON,NetCDF|account_token|NASA Earth science data"
      - "USGS Landsat|https://landsatlook.usgs.gov/|GeoTIFF,JSON|api_key|Landsat satellite imagery"
      - "NASA FIRMS|https://firms.modaps.eosdis.nasa.gov/|CSV,JSON|api_key|Fire Information for Resource Management"
      - "Maxar/Planet|https://api.maxar.com/|GeoTIFF,JSON|api_key|Commercial high-resolution imagery"

  - id: 5
    name: "Economic & Financial"
    streams: 8
    access: "8G"
    formats: "JSON, CSV, XML"
    cadence: daily
    adapter: rest_json
    fallback: null
    sources:
