      - "Human Freedom Index|https://www.cato.org/|JSON|none|Cato/Fraser Institute"
      - "IAEA PRIS|https://pris.iaea.org/|JSON|none|Power Reactor Information System"

  - id: 9
    name: "EU & Eurostat"
    streams: 13
