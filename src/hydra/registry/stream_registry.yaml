      - "IMF|https://dataservices.imf.org/|JSON,SDMX|none|International Monetary Fund data"
      - "OECD|https://stats.oecd.org/|JSON,SDMX|none|Organisation for Economic Co-operation"
      - "UN Data|https://data.un.org/|JSON,CSV|none|United Nations statistical data"
      - "WHO GHO|https://ghoapi.azureedge.net/api/|JSON|none|Global Health Observatory"
