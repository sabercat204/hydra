    formats: "JSON, SDMX, CSV"
    cadence: daily
    adapter: sdmx
    fallback: ckan
    sources:
      - "Eurostat|https://ec.europa.eu/eurostat/api/|SDMX,JSON|none|EU statistical office"
      - "EU Open Data Portal|https://data.europa.eu/api/|JSON,CSV|none|EU open data"
      - "ECB Statistical Data Warehouse|https://sdw-wsrest.ecb.europa.eu/|SDMX|none|European Central Bank"
      - "Copernicus CDS|https://cds.climate.copernicus.eu/api/|NetCDF,GRIB|api_key|Climate Data Store"
      - "ICOS Carbon Portal|https://data.icos-cp.eu/|NetCDF,CSV|none|Integrated Carbon Observation System"
